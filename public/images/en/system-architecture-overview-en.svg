<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Typical AI automation system architecture in English">
  <rect width="1200" height="760" rx="36" fill="#0f172a"/>
  <text x="80" y="86" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#f8fafc">Typical AI Automation Architecture</text>
  <text x="80" y="126" font-family="Arial, sans-serif" font-size="20" fill="#cbd5e1">Input, routing, AI processing, reply and logs in one maintainable flow.</text>
  <defs><marker id="a" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto"><path d="M2,2 L12,7 L2,12 Z" fill="#14b8a6"/></marker></defs>
  <g font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#f8fafc">
    <rect x="70" y="270" width="210" height="120" rx="18" fill="#172033" stroke="#334155"/><text x="175" y="318" text-anchor="middle">LINE / Forms</text><text x="175" y="354" text-anchor="middle" font-size="16" font-weight="400" fill="#cbd5e1">messages and files</text>
    <rect x="355" y="270" width="210" height="120" rx="18" fill="#172033" stroke="#334155"/><text x="460" y="318" text-anchor="middle">n8n Routing</text><text x="460" y="354" text-anchor="middle" font-size="16" font-weight="400" fill="#cbd5e1">intent and rules</text>
    <rect x="640" y="270" width="210" height="120" rx="18" fill="#172033" stroke="#334155"/><text x="745" y="318" text-anchor="middle">AI / RAG / OCR</text><text x="745" y="354" text-anchor="middle" font-size="16" font-weight="400" fill="#cbd5e1">reasoning and retrieval</text>
    <rect x="925" y="270" width="210" height="120" rx="18" fill="#172033" stroke="#334155"/><text x="1030" y="318" text-anchor="middle">Reply and Logs</text><text x="1030" y="354" text-anchor="middle" font-size="16" font-weight="400" fill="#cbd5e1">response and records</text>
  </g>
  <path d="M280 330 H352" stroke="#14b8a6" stroke-width="5" marker-end="url(#a)"/><path d="M565 330 H637" stroke="#14b8a6" stroke-width="5" marker-end="url(#a)"/><path d="M850 330 H922" stroke="#14b8a6" stroke-width="5" marker-end="url(#a)"/>
  <rect x="330" y="510" width="540" height="92" rx="18" fill="rgba(245,158,11,0.12)" stroke="#f59e0b"/>
  <text x="600" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#f8fafc">Documentation and Recovery Steps</text>
  <text x="600" y="582" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#cbd5e1">Every prototype should explain how to test, inspect and restore the workflow.</text>
</svg>

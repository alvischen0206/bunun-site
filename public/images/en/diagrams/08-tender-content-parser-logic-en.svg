<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Tender content parser workflow diagram in English"><rect width="1400" height="900" rx="32" fill="#f8fbff"/><text x="700" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="900" fill="#0f172a">Tender Content Parser</text><g font-family="Arial, sans-serif"><rect x="120" y="210" width="1160" height="530" rx="26" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/><text x="210" y="295" font-size="25" font-weight="900" fill="#155bd5">Extracted Fields</text><text x="210" y="350" font-size="22" fill="#334155">Tender title, due date, deposit, eligibility and contact data</text><text x="210" y="435" font-size="25" font-weight="900" fill="#16a34a">Rule Checks</text><text x="210" y="490" font-size="22" fill="#334155">Normalize date formats, confirm missing values and flag risks</text><text x="210" y="575" font-size="25" font-weight="900" fill="#f97316">Summary Output</text><text x="210" y="630" font-size="22" fill="#334155">Prepare searchable summary and fields for RAG or dashboard display</text></g></svg>
